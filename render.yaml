# Render Blueprint for the FastAPI backend.
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Secret values (sync: false) are entered in the Render dashboard, not here.
services:
  - type: web
    name: zylabs-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LOG_LEVEL
        value: INFO
      # Secrets / per-deploy values — set these in the Render dashboard:
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
